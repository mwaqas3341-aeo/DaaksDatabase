<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheet Index — Drive Folder Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --ink:#1c1f22;
    --paper:#f6f4ee;
    --line:#d8d3c5;
    --accent:#b5562f;
    --accent-soft:#f0e3da;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --serif: 'Georgia', 'Iowan Old Style', serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--serif);
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
  }
  header{
    border-bottom:2px solid var(--ink);
    padding:28px 32px 20px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    margin:0;
    font-size:28px;
    letter-spacing:0.5px;
    font-weight:700;
  }
  header h1 span{
    color:var(--accent);
  }
  .meta{
    font-family:var(--mono);
    font-size:12px;
    color:#6b6358;
    text-align:right;
  }
  .meta button{
    font-family:var(--mono);
    font-size:11px;
    border:1px solid var(--ink);
    background:transparent;
    padding:5px 10px;
    cursor:pointer;
    margin-left:8px;
    border-radius:2px;
  }
  .meta button:hover{ background:var(--ink); color:var(--paper); }

  .controls{
    padding:18px 32px;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    align-items:center;
  }
  .controls input[type="text"]{
    flex:1;
    min-width:200px;
    padding:9px 12px;
    border:1px solid var(--ink);
    background:#fff;
    font-family:var(--mono);
    font-size:13px;
    border-radius:2px;
  }
  .controls select{
    padding:9px 10px;
    border:1px solid var(--ink);
    background:#fff;
    font-family:var(--mono);
    font-size:13px;
    border-radius:2px;
  }
  .count-badge{
    font-family:var(--mono);
    font-size:12px;
    color:#6b6358;
  }

  main{ padding:24px 32px 60px; }

  .year-block{ margin-bottom:8px; }
  .year-head{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    user-select:none;
  }
  .year-head .num{
    font-family:var(--mono);
    font-size:32px;
    font-weight:700;
    color:var(--accent);
    min-width:90px;
  }
  .year-head .info{ flex:1; font-family:var(--mono); font-size:12px; color:#6b6358; }
  .year-head .toggle{ font-family:var(--mono); font-size:18px; transition:transform .2s; }
  .year-head.collapsed .toggle{ transform:rotate(-90deg); }
  .year-actions button, .month-actions button, .day-actions button{
    font-family:var(--mono);
    font-size:11px;
    border:1px solid var(--ink);
    background:#fff;
    padding:4px 9px;
    cursor:pointer;
    border-radius:2px;
    white-space:nowrap;
  }
  .year-actions button:hover, .month-actions button:hover, .day-actions button:hover{
    background:var(--accent); color:#fff; border-color:var(--accent);
  }

  .year-body{ padding-left:12px; }
  .year-body.collapsed{ display:none; }

  .month-block{ border-left:2px solid var(--line); margin:10px 0 10px 12px; padding-left:18px; }
  .month-head{
    display:flex; align-items:center; gap:12px; padding:8px 0; cursor:pointer; user-select:none;
  }
  .month-head .name{ font-weight:700; font-size:16px; min-width:140px; }
  .month-head .info{ flex:1; font-family:var(--mono); font-size:11px; color:#6b6358; }
  .month-head .toggle{ font-family:var(--mono); font-size:14px; transition:transform .2s; }
  .month-head.collapsed .toggle{ transform:rotate(-90deg); }
  .month-body.collapsed{ display:none; }

  .day-block{ border-left:1px dashed var(--line); margin:6px 0 6px 6px; padding:6px 0 6px 16px; }
  .day-head{
    display:flex; align-items:center; gap:12px; padding:4px 0;
  }
  .day-head .name{ font-family:var(--mono); font-size:12px; color:#6b6358; min-width:90px; }

  table{ width:100%; border-collapse:collapse; margin:4px 0 6px; }
  td{ padding:6px 8px; font-size:13.5px; border-bottom:1px solid #ece8dd; vertical-align:middle; }
  td.dl{ width:90px; text-align:right; }
  td.path{ color:#9a9183; font-family:var(--mono); font-size:11px; }
  .sheet-name{ font-weight:600; }
  .sheet-name a{ color:var(--ink); text-decoration:none; border-bottom:1px solid var(--accent); }
  .sheet-name a:hover{ color:var(--accent); }
  .dl-link{
    font-family:var(--mono); font-size:11px; color:var(--accent); text-decoration:none;
    border:1px solid var(--accent); padding:3px 8px; border-radius:2px; white-space:nowrap;
  }
  .dl-link:hover{ background:var(--accent); color:#fff; }

  .empty{
    text-align:center; padding:80px 20px; color:#9a9183; font-family:var(--mono); font-size:13px;
  }
  .error-box{
    margin:24px 32px; padding:16px; border:1px solid var(--accent); background:var(--accent-soft);
    font-family:var(--mono); font-size:13px; border-radius:4px;
  }
</style>
</head>
<body>

<header>
  <h1>Sheet<span>Index</span></h1>
  <div class="meta">
    <div id="folderName">loading…</div>
    <div id="generatedAt"></div>
    <button id="refreshBtn">↻ refresh data.json</button>
  </div>
</header>

<div class="controls">
  <input type="text" id="searchBox" placeholder="search by name…">
  <select id="yearFilter"><option value="">All years</option></select>
  <select id="monthFilter"><option value="">All months</option></select>
  <span class="count-badge" id="countBadge"></span>
</div>

<main id="main">
  <div class="empty">Loading data.json…</div>
</main>

<script>
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let ALL_SHEETS = [];
let DATA = null;

async function loadData(){
  try{
    const res = await fetch('data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('data.json not found (HTTP '+res.status+')');
    DATA = await res.json();
    ALL_SHEETS = DATA.sheets || [];
    document.getElementById('folderName').textContent = DATA.rootFolderName || '';
    document.getElementById('generatedAt').textContent = 'updated: ' + new Date(DATA.generatedAt).toLocaleString();
    populateFilters();
    render();
  } catch(e){
    document.getElementById('main').innerHTML =
      `<div class="error-box">Could not load <code>data.json</code>.<br><br>
       This file is generated by the Apps Script backend and pushed to this repo.
       Make sure data.json exists at the repo root and the Apps Script trigger has run at least once.<br><br>
       Error: ${e.message}</div>`;
  }
}

function populateFilters(){
  const years = [...new Set(ALL_SHEETS.map(s=>s.year))].sort((a,b)=>b-a);
  const yearSel = document.getElementById('yearFilter');
  years.forEach(y=>{
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSel.appendChild(opt);
  });
  const monthSel = document.getElementById('monthFilter');
  MONTH_NAMES.forEach((m,i)=>{
    const opt = document.createElement('option');
    opt.value = i+1; opt.textContent = m;
    monthSel.appendChild(opt);
  });
}

function getFiltered(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const yf = document.getElementById('yearFilter').value;
  const mf = document.getElementById('monthFilter').value;
  return ALL_SHEETS.filter(s=>{
    if(q && !s.name.toLowerCase().includes(q)) return false;
    if(yf && String(s.year) !== yf) return false;
    if(mf && String(s.month) !== mf) return false;
    return true;
  });
}

function groupData(sheets){
  const byYear = {};
  sheets.forEach(s=>{
    byYear[s.year] = byYear[s.year] || {};
    byYear[s.year][s.month] = byYear[s.year][s.month] || {};
    byYear[s.year][s.month][s.day] = byYear[s.year][s.month][s.day] || [];
    byYear[s.year][s.month][s.day].push(s);
  });
  return byYear;
}

function exportUrl(id){
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=xlsx`;
}

async function downloadZip(sheets, zipName){
  const zip = new JSZip();
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;
  try{
    await Promise.all(sheets.map(async s=>{
      try{
        const resp = await fetch(exportUrl(s.id));
        const blob = await resp.blob();
        const safeName = s.name.replace(/[\\/:*?"<>|]/g,'_');
        zip.file(`${safeName}.xlsx`, blob);
      }catch(e){ console.warn('Failed to fetch', s.name, e); }
    }));
    const content = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url; a.download = `${zipName}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

function render(){
  const sheets = getFiltered();
  document.getElementById('countBadge').textContent = `${sheets.length} sheet${sheets.length===1?'':'s'}`;
  const main = document.getElementById('main');
  main.innerHTML = '';

  if(sheets.length === 0){
    main.innerHTML = '<div class="empty">No sheets match.</div>';
    return;
  }

  const byYear = groupData(sheets);
  const years = Object.keys(byYear).sort((a,b)=>b-a);

  years.forEach(year=>{
    const yearSheets = Object.values(byYear[year]).flatMap(m=>Object.values(m).flat());
    const yearBlock = document.createElement('div');
    yearBlock.className = 'year-block';

    const yearHead = document.createElement('div');
    yearHead.className = 'year-head';
    yearHead.innerHTML = `
      <span class="toggle">▾</span>
      <span class="num">${year}</span>
      <span class="info">${yearSheets.length} sheet${yearSheets.length===1?'':'s'}</span>
      <span class="year-actions"><button>download all ${year}</button></span>
    `;
    const yearBody = document.createElement('div');
    yearBody.className = 'year-body';

    yearHead.querySelector('.toggle').parentElement.addEventListener('click', (e)=>{
      if(e.target.closest('button')) return;
      yearHead.classList.toggle('collapsed');
      yearBody.classList.toggle('collapsed');
    });
    yearHead.querySelector('.year-actions button').addEventListener('click', (e)=>{
      e.stopPropagation();
      downloadZip(yearSheets, `sheets_${year}`);
    });

    const months = Object.keys(byYear[year]).sort((a,b)=>b-a);
    months.forEach(month=>{
      const monthSheets = Object.values(byYear[year][month]).flat();
      const monthBlock = document.createElement('div');
      monthBlock.className = 'month-block';

      const monthHead = document.createElement('div');
      monthHead.className = 'month-head';
      monthHead.innerHTML = `
        <span class="toggle">▾</span>
        <span class="name">${MONTH_NAMES[month-1]}</span>
        <span class="info">${monthSheets.length} sheet${monthSheets.length===1?'':'s'}</span>
        <span class="month-actions"><button>download all</button></span>
      `;
      const monthBody = document.createElement('div');
      monthBody.className = 'month-body';

      monthHead.addEventListener('click', (e)=>{
        if(e.target.closest('button')) return;
        monthHead.classList.toggle('collapsed');
        monthBody.classList.toggle('collapsed');
      });
      monthHead.querySelector('.month-actions button').addEventListener('click', (e)=>{
        e.stopPropagation();
        downloadZip(monthSheets, `sheets_${year}_${MONTH_NAMES[month-1]}`);
      });

      const days = Object.keys(byYear[year][month]).sort((a,b)=>b-a);
      days.forEach(day=>{
        const daySheets = byYear[year][month][day];
        const dayBlock = document.createElement('div');
        dayBlock.className = 'day-block';

        const dayHead = document.createElement('div');
        dayHead.className = 'day-head';
        const dateLabel = `${MONTH_NAMES[month-1]} ${day}, ${year}`;
        dayHead.innerHTML = `
          <span class="name">${dateLabel}</span>
          <span class="day-actions"><button>download all</button></span>
        `;
        dayHead.querySelector('.day-actions button').addEventListener('click', ()=>{
          downloadZip(daySheets, `sheets_${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
        });

        const table = document.createElement('table');
        daySheets.forEach(s=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="sheet-name"><a href="${s.url}" target="_blank">${escapeHtml(s.name)}</a><br><span class="path">${escapeHtml(s.path)}</span></td>
            <td class="dl"><a class="dl-link" href="${exportUrl(s.id)}">.xlsx</a></td>
          `;
          table.appendChild(tr);
        });

        dayBlock.appendChild(dayHead);
        dayBlock.appendChild(table);
        monthBody.appendChild(dayBlock);
      });

      monthBlock.appendChild(monthHead);
      monthBlock.appendChild(monthBody);
      yearBody.appendChild(monthBlock);
    });

    yearBlock.appendChild(yearHead);
    yearBlock.appendChild(yearBody);
    main.appendChild(yearBlock);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('yearFilter').addEventListener('change', render);
document.getElementById('monthFilter').addEventListener('change', render);
document.getElementById('refreshBtn').addEventListener('click', loadData);

loadData();
</script>
</body>
</html>
