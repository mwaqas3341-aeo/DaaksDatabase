<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Daaks Record — Tehsil Karor</title>
    <style>
        :root {
            --bg: #0b0e14;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent-blue: #00c2ff;
            --accent-green: #39ff14;
            --accent-pink: #ff6ec7;
            --shadow-glow-blue: 0 0 12px rgba(0, 194, 255, 0.5), 0 0 24px rgba(0, 194, 255, 0.2);
            --shadow-glow-green: 0 0 12px rgba(57, 255, 20, 0.5), 0 0 24px rgba(57, 255, 20, 0.2);
            --mono: 'JetBrains Mono', 'Courier New', monospace;
            --serif: 'Georgia', 'Iowan Old Style', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--serif);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* header */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 194, 255, 0.3);
        }

        .title-section .sub {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--accent-blue);
            margin-top: 4px;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: var(--mono);
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 12px var(--accent-green);
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.2);
            }
        }

        .total-sheets-badge {
            background: var(--surface);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--accent-blue);
            box-shadow: var(--shadow-glow-blue);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* main layout */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px 12px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }

        .sidebar h3 {
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--accent-blue);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 8px;
        }

        .year-list {
            list-style: none;
        }

        .year-item {
            padding: 10px 16px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s;
            border: 1px solid transparent;
            color: var(--text);
        }

        .year-item:hover {
            background: #1c2330;
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(0, 194, 255, 0.3);
        }

        .year-item.active {
            background: #0d2b3e;
            border-color: var(--accent-blue);
            color: #fff;
            box-shadow: var(--shadow-glow-blue);
        }

        .main-content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }

        .search-container {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition: border 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 194, 255, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .month-block {
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            overflow: hidden;
        }

        .month-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: #1c2128;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .month-head:hover {
            background: #242c36;
        }

        .month-head .month-name {
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-head .sheet-count {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--accent-green);
            background: #0f1a0f;
            padding: 4px 10px;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
        }

        .month-head .toggle-icon {
            font-size: 1.4rem;
            color: var(--accent-blue);
            transition: transform 0.2s;
        }

        .month-head.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .month-body {
            padding: 8px 0;
            transition: max-height 0.3s ease;
        }

        .month-body.collapsed {
            display: none;
        }

        .sheet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            border-bottom: 1px solid #21262d;
            transition: background 0.15s;
        }

        .sheet-row:last-child {
            border-bottom: none;
        }

        .sheet-row:hover {
            background: #1b2129;
        }

        .sheet-info {
            flex: 1;
        }

        .sheet-name {
            font-weight: 600;
            color: #e6edf3;
            font-size: 1rem;
        }

        .sheet-path {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .sheet-actions {
            display: flex;
            gap: 10px;
            margin-left: 16px;
        }

        .neon-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-open {
            background: #0a1a2b;
            color: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(0, 194, 255, 0.2);
        }

        .btn-open:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: var(--shadow-glow-blue);
            transform: translateY(-1px);
        }

        .btn-download {
            background: #0f1a0f;
            color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }

        .btn-download:hover {
            background: var(--accent-green);
            color: #000;
            box-shadow: var(--shadow-glow-green);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 1rem;
        }

        .error-box {
            background: #2d0f0f;
            border: 1px solid #ff5555;
            color: #ffaaaa;
            padding: 20px;
            border-radius: 8px;
            font-family: var(--mono);
            margin: 30px;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 12px;
            }
            .year-list {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .year-item {
                padding: 8px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="title-section">
            <h1>Previous Daaks Record of Tehsil Karor</h1>
            <div class="sub">( By Muhammad Waqas Assistant Education Officer Fateh Pur )</div>
        </div>
        <div class="stats">
            <span style="display:flex;align-items:center;">
                <span class="live-dot"></span> Live
            </span>
            <div class="total-sheets-badge" id="totalSheetsBadge">📄 0 sheets</div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <h3>📅 Years</h3>
            <ul class="year-list" id="yearList"></ul>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="search-container">
                <input type="text" class="search-input" id="searchBox" placeholder="🔍 Search sheets by name…" />
            </div>
            <div id="displayArea">
                <div class="empty-state">Select a year from the sidebar to view months and sheets.</div>
            </div>
        </main>
    </div>

    <script>
        const MONTH_NAMES = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        let ALL_SHEETS = [];
        let selectedYear = null;

        // Fetch data.json
        async function loadData() {
            try {
                const res = await fetch('data.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('data.json not found (HTTP ' + res.status + ')');
                const data = await res.json();
                ALL_SHEETS = data.sheets || [];
                document.getElementById('totalSheetsBadge').innerHTML =
                    `📄 ${ALL_SHEETS.length} sheet${ALL_SHEETS.length !== 1 ? 's' : ''}`;
                buildYearSidebar();
                // If a year was previously selected, refresh display
                if (selectedYear) {
                    renderMonthsForYear(selectedYear);
                }
            } catch (e) {
                document.getElementById('displayArea').innerHTML =
                    `<div class="error-box">Could not load <code>data.json</code>.<br><br>
                     Error: ${e.message}</div>`;
            }
        }

        function buildYearSidebar() {
            const years = [...new Set(ALL_SHEETS.map(s => s.year))].sort((a, b) => b - a);
            const ul = document.getElementById('yearList');
            ul.innerHTML = '';
            years.forEach(y => {
                const li = document.createElement('li');
                li.className = 'year-item' + (selectedYear === y ? ' active' : '');
                li.textContent = y;
                li.addEventListener('click', () => {
                    selectedYear = y;
                    // update active class
                    document.querySelectorAll('.year-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderMonthsForYear(y);
                    document.getElementById('searchBox').value = '';
                });
                ul.appendChild(li);
            });
        }

        function getFilteredForYear(year) {
            const query = document.getElementById('searchBox').value.trim().toLowerCase();
            return ALL_SHEETS.filter(s => {
                if (s.year !== year) return false;
                if (query && !s.name.toLowerCase().includes(query)) return false;
                return true;
            });
        }

        function groupByMonth(sheets) {
            const map = {};
            sheets.forEach(s => {
                if (!map[s.month]) map[s.month] = [];
                map[s.month].push(s);
            });
            // sort months numerically (ascending)
            const sortedMonths = Object.keys(map).map(Number).sort((a, b) => a - b);
            // alphabetically sort sheets within each month
            for (let m in map) {
                map[m].sort((a, b) => a.name.localeCompare(b.name));
            }
            return { map, sortedMonths };
        }

        function exportUrl(id) {
            return `https://docs.google.com/spreadsheets/d/${id}/export?format=xlsx`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderMonthsForYear(year) {
            const sheets = getFilteredForYear(year);
            const displayArea = document.getElementById('displayArea');
            if (sheets.length === 0) {
                displayArea.innerHTML =
                    `<div class="empty-state">No sheets found for ${year}${document.getElementById('searchBox').value ? ' matching search' : ''}.</div>`;
                return;
            }

            const { map, sortedMonths } = groupByMonth(sheets);
            let html = '';
            sortedMonths.forEach(month => {
                const monthSheets = map[month];
                const monthName = MONTH_NAMES[month - 1];
                html += `
                <div class="month-block">
                    <div class="month-head" data-month="${month}">
                        <div class="month-name">
                            <span class="toggle-icon">▾</span> ${monthName}
                        </div>
                        <span class="sheet-count">${monthSheets.length} sheet${monthSheets.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="month-body">
                        ${monthSheets.map(s => `
                            <div class="sheet-row">
                                <div class="sheet-info">
                                    <div class="sheet-name">${escapeHtml(s.name)}</div>
                                    <div class="sheet-path">${escapeHtml(s.path)}</div>
                                </div>
                                <div class="sheet-actions">
                                    <a href="${s.url}" target="_blank" class="neon-btn btn-open">📂 Open</a>
                                    <a href="${exportUrl(s.id)}" download class="neon-btn btn-download">⬇ Download</a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            displayArea.innerHTML = html;

            // attach collapse toggle
            document.querySelectorAll('.month-head').forEach(head => {
                head.addEventListener('click', function() {
                    this.classList.toggle('collapsed');
                    const body = this.nextElementSibling;
                    if (body) body.classList.toggle('collapsed');
                });
            });
        }

        // Search handler
        document.getElementById('searchBox').addEventListener('input', function() {
            if (selectedYear) {
                renderMonthsForYear(selectedYear);
            }
        });

        // Initial load
        loadData();

        // Live refresh every 5 minutes
        setInterval(() => {
            loadData();
        }, 300000);

        // Simulate live feeling: update time
        function updateLiveTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const liveElem = document.querySelector('.stats span:first-child');
            if (liveElem) liveElem.innerHTML = `<span class="live-dot"></span> Live • ${timeStr}`;
        }
        setInterval(updateLiveTime, 1000);
        updateLiveTime();
    </script>
</body>
</html>
